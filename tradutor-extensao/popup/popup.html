<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Tradutor</title>
    <style>
        body { width: 220px; font-family: Arial, sans-serif; padding: 10px; text-align: center; }
        button { padding: 10px 15px; margin-top: 10px; cursor: pointer; border: none; border-radius: 5px; background: #0078D7; color: white; font-weight: bold; width: 100%; transition: 0.2s;}
        button:hover { background: #005A9E; }
        #status { margin-top: 15px; font-size: 13px; color: #555; }
    </style>
</head>
<body>
    <h3>Tradutor Universal</h3>
    <button id="startBtn">Abrir Painel do Tradutor</button>
    <div id="status">Este botão vai abrir o nosso estúdio local. Funciona mesmo fechando a janela!</div>
    <script src="popup.js"></script>
</body>
</html>
