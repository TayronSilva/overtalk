<style>
        body {
            background-color: #08080a;
            color: #e5e1e4;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(13, 27, 42, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);

            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        }

        }

        .input-cutout {
            background: transparent;
            border: none;
            border-bottom: 1px solid #1b263b;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-cutout:focus {
            border-bottom: 1px solid #ffc174;

            position: absolute;
            width: 400px;

            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, rgba(13, 27, 42, 0) 70%);

<body class="min-h-screen flex flex-col font-body-md">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="floating-orb top-[-10%] left-[-10%]" style="transform: translateX(-115.4px) translateY(9.24px);"></div>
<div class="floating-orb bottom-[-20%] right-[-10%] scale-150" style="transform: translateX(-243.6px) translateY(8.24px);"></div>
</div>
<!-- Top App Bar (Shared Component Anchor) -->
<header class="flex justify-between items-center w-full px-container-padding-mobile md:px-container-padding-desktop py-stack-sm top-0 fixed z-50">
<div class="font-display-lg text-display-lg-mobile md:text-display-lg tracking-tighter text-primary">OverTalk</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors p-2">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Main Registration Section -->
<main class="flex-grow flex items-center justify-center px-container-padding-mobile py-stack-lg mt-16">
<div class="w-full max-w-[480px] glass-panel rounded-xl p-stack-md md:p-stack-lg border border-outline-variant/20">
<!-- Heading Area -->
<div class="text-center mb-stack-md">
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface mb-2">Criar Conta</h1>
<p class="text-on-surface-variant text-body-md">Inicie sua jornada de comunicação global.</p>
</div>
<!-- Social Registration -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container hover:bg-surface-container-high border border-outline-variant/30 rounded-lg py-3 px-4 transition-all active:scale-[0.98]"><img alt="Google Logo" class="w-5 h-5" src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png"><span class="font-label-caps text-label-caps text-on-surface">Registrar com Google</span></button>
<!-- Divider -->
<div class="flex items-center my-stack-md gap-4">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">OU</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
<!-- Registration Form -->
<form class="space-y-stack-md" id="registrationForm">
<!-- Name Field -->
<!-- Email Field -->
<div class="group amber-glow">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block" for="email">E-mail</label>
<div class="relative">
<input class="w-full input-cutout py-3 text-on-surface font-body-md placeholder:text-on-surface-variant/30" id="email" placeholder="nome@exemplo.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="group amber-glow">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block" for="password">Senha</label>
<div class="relative">
<input class="w-full input-cutout py-3 text-on-surface font-body-md placeholder:text-on-surface-variant/30 pr-10" id="password" placeholder="••••••••" type="password">
<button class="absolute right-0 bottom-3 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword('password', 'toggleIcon1')" type="button">
<span class="material-symbols-outlined" id="toggleIcon1">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<!-- Action Button -->
<button class="w-full primary-gradient text-on-primary-fixed font-headline-md py-4 rounded-lg shadow-lg shadow-primary-container/10 border border-primary/20 hover:brightness-110 transition-all active:scale-[0.98] mt-stack-md" type="submit">
                    Registrar
                </button>
</form>
<!-- Secondary Action -->
<div class="mt-stack-md text-center">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors decoration-primary underline-offset-4 decoration-1" href="#">
                    Já tenho uma conta
                </a>
</div>
</div>
</main>
<!-- Footer (Shared Component Anchor) -->
<footer class="flex flex-col md:flex-row justify-between items-center w-full px-container-padding-mobile md:px-container-padding-desktop py-stack-md gap-4">
<div class="font-display-lg text-display-lg text-primary opacity-50 scale-75 origin-left">OverTalk</div>
<div class="font-label-caps text-label-caps text-on-surface-variant">© 2024 OverTalk AI. Precision Guaranteed.</div>
<div class="flex gap-stack-md">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all" href="#">Privacy</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all" href="#">Security</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all" href="#">Terms</a>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Form Submission visual feedback
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="flex items-center justify-center gap-2">Processando...</span>';
            btn.classList.add('opacity-80', 'cursor-wait');
            
            setTimeout(() => {
                btn.innerHTML = 'Registrar';
                btn.classList.remove('opacity-80', 'cursor-wait');
            }, 2000);
        });

        // Floating orb mouse parallax
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.floating-orb');
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            orbs.forEach((orb, index) => {
                const speed = (index + 1) * 20;
                const x = (window.innerWidth - mouseX * speed) / 100;
                const y = (window.innerHeight - mouseY * speed) / 100;
                orb.style.transform = `translateX(${x}px) translateY(${y}px)`;
            });
        });
    </script>


</body></html>
