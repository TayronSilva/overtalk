<!-- Micro-interaction Scripts -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
            }
        }

        // Atmospheric mouse track glow (subtle)
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            if (!card) return;
            
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        });

        async function handleEmailLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) { alert('Preencha email e senha.'); return; }
            
            try {
                await signInWithEmail(email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                alert('Erro: ' + (err.message || 'Falha no login'));
            }
        }

        // Auto-redirect se já logado
        (async () => {
            const session = await checkSession();
            if (session) window.location.href = 'dashboard.html';
        })();
    </script>
