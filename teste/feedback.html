<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('[data-star]');
            let currentRating = 0;

            stars.forEach(star => {
                star.addEventListener('mouseenter', () => {
                    const rating = parseInt(star.getAttribute('data-star'));
                    highlightStars(rating);
                });

                star.addEventListener('mouseleave', () => {
                    highlightStars(currentRating);
                });

                star.addEventListener('click', () => {
                    currentRating = parseInt(star.getAttribute('data-star'));
                    highlightStars(currentRating);
                    // Pulsating effect on selection
                    star.style.transform = 'scale(1.4)';
                    setTimeout(() => star.style.transform = 'scale(1.2)', 150);
                });
            });

            function highlightStars(rating) {
                stars.forEach(star => {
                    const starVal = parseInt(star.getAttribute('data-star'));
                    if (starVal <= rating) {
                        star.classList.add('star-active');
                        star.classList.remove('text-outline');
                    } else {
                        star.classList.remove('star-active');
                        star.classList.add('text-outline');
                    }
                });
            }
        });
    </script>
