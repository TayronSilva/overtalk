<style>
        body {
            background-color: #08080a;
            color: #e5e1e4;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(13, 27, 42, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .amber-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, rgba(245, 158, 11, 0) 70%);
            filter: blur(40px);
            z-index: -1;
            border-radius: 50%;
        }

        .primary-btn {
            background: linear-gradient(to bottom, #f59e0b, #d97706);
            border: 1px solid #fbbf24;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.15);
            transition: all 0.3s ease;
        }

        .primary-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.25);
        }

        .primary-btn:active {
            transform: scale(0.98);
        }

        .input-cutout {
            background: transparent;
            border: none;
            border-bottom: 1px solid #1b263b;
            transition: all 0.3s ease;

            outline: none;
            border-bottom: 1px solid #f59e0b;

<body class="min-h-screen flex flex-col justify-center items-center font-body-md px-container-padding-mobile md:px-0">
<!-- Ambient Background Effects -->
<div class="amber-glow top-[-100px] left-[-100px]"></div>
<div class="amber-glow bottom-[-150px] right-[-50px]"></div>
<!-- Main Content Container -->
<main class="w-full max-w-[440px] z-10">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="mb-4">
<span class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary tracking-tighter"></span>
</div>
</div>
<!-- Recover Card -->
<div class="glass-card w-full rounded-xl p-8 md:p-10" style="--mouse-x: 329px; --mouse-y: -95.796875px;">
<header class="mb-8">
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface mb-2">Recuperar Senha</h1>
<p class="text-on-surface-variant font-body-md opacity-80">Informe seu e-mail e enviaremos instruções para criar uma nova senha.</p>
</header>
<!-- Recover Form -->
<form onsubmit="event.preventDefault(); handleRecover();" class="space-y-6">
<!-- Email Field -->
<div class="relative group">
<label class="block text-label-caps font-label-caps text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors" for="email">E-mail</label>
<input class="w-full input-cutout py-3 text-on-surface placeholder:text-surface-container-highest transition-all" id="email" placeholder="nome@exemplo.com" required="" type="email">
</div>
<!-- Action Button -->
<button class="w-full primary-btn text-on-primary font-bold py-4 rounded-lg flex items-center justify-center gap-2 mt-stack-md" type="submit">
<span class="">Enviar Instruções</span>
<span class="material-symbols-outlined">send</span>
</button>
</form>
</div>
<!-- Footer Actions -->
<footer class="mt-stack-md flex justify-center w-full">
<p class="text-on-surface-variant font-body-md">
                Lembrou a senha? 
                <a class="text-primary font-semibold hover:underline ml-1" href="login.html">Voltar ao Login</a>
</p>
</footer>
</main>
<!-- Micro-interaction Scripts -->
<script>
        // Atmospheric mouse track glow (subtle)
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            if (!card) return;
            
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        });

        function handleRecover() {
            const email = document.getElementById('email').value;
            alert(`Instruções de recuperação foram enviadas para ${email}! Verifique sua caixa de entrada.`);
            window.location.href = 'login.html';
        }
    </script>
<!-- Top AppBar Style Mapping from JSON (Visual Only for Login Screen) -->
