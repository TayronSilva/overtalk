<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OverTalk — Pagamento</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f59e0b'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial,sans-serif' font-weight='900' font-size='16' fill='%23000'%3EOT%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #131315; --surface: rgba(13,27,42,0.6); --amber: #f59e0b; --amber-glow: rgba(245,158,11,0.22); --text-main: #e5e1e4; --text-sub: #a08e7a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background-image: radial-gradient(circle at 15% 50%, rgba(245,158,11,0.08) 0%, transparent 50%), radial-gradient(circle at 85% 30%, rgba(255,193,116,0.05) 0%, transparent 50%); }
    .card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 48px; max-width: 480px; width: 90%; text-align: center; }
    .badge { display: inline-block; padding: 5px 16px; border-radius: 20px; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: var(--amber); margin-bottom: 16px; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; margin-bottom: 12px; }
    p { color: var(--text-sub); line-height: 1.7; margin-bottom: 24px; font-size: 14px; }
    .btn { display: inline-block; background: var(--amber); color: #472a00; padding: 14px 32px; border-radius: 10px; font-weight: 700; text-decoration: none; transition: all 0.3s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--amber-glow); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Fase Beta</div>
    <h1>Pagamentos Indisponíveis</h1>
    <p>Estamos em fase beta testando o OverTalk. Por enquanto todos os recursos são gratuitos e não há cobranças.<br><br>Fique ligado — quando estivermos prontos para lançar os planos pagos, avisamos primeiro.</p>
    <a href="/index.html" class="btn">Ir para o Dashboard</a>
  </div>
</body>
</html>
