<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OverTalk - Acesso Restrito</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f59e0b'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial,sans-serif' font-weight='900' font-size='16' fill='%23000'%3EOT%3C/text%3E%3C/svg%3E" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" crossorigin src="/assets/login-CMv2QUt-.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/dist-DzQ6C2DZ.js">
  <link rel="stylesheet" crossorigin href="/assets/login-Cc19Sl42.css">
</head>
<body>

  <div class="login-container">
    <a href="/landing.html" class="home-btn" title="Voltar para Home">⌂ Home</a>
    <div class="login-box glass-panel" id="loginBox">
      <div class="logo-area">
        <div class="logo-icon">OT</div>
        <h2>OVERTALK</h2>
        <p class="subtitle">THE RADIO ROOM</p>
      </div>

      <div id="modeBadge" class="mode-badge login-mode">🔐 ENTRAR</div>

      <!-- Google OAuth Button -->
      <button onclick="signInWithGoogle()" class="btn-google" type="button">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.87.92 7.53 2.56 10.78l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Entrar com Google
      </button>

      <div class="divider"><span>ou</span></div>

      <form id="loginForm">
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" required placeholder="seu@email.com" class="input-modern" />
        </div>
        <div class="input-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required placeholder="••••••••" class="input-modern" />
        </div>
        <div class="input-group" id="confirmGroup" style="display:none;">
          <label for="confirmPassword">Confirmar Senha</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" class="input-modern" />
        </div>
        <div id="authError" class="auth-error" style="display: none;"></div>
        <button type="submit" id="btnSubmit" class="btn-action">AUTENTICAR SISTEMA</button>
      </form>
      
      <div class="toggle-mode">
        <span id="toggleText">Primeira vez?</span>
        <a href="#" id="toggleLink">Criar Conta</a>
      </div>
    </div>
  </div>

</body>
</html>
